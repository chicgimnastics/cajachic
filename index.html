<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

.header {
    background: black;
    color: white;
    padding: 15px;
    text-align: center;
}

.container {
    padding: 15px;
}
    
.lista-box {
    background: white;
    border-radius: 12px;
    padding: 12px;
    min-height: 120px;
    margin-bottom: 10px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.empty {
    text-align: center;
    color: gray;
    font-size: 14px;
}
.producto {
    background: white;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
}

.btn-eliminar {
    background: red;
    color: white;
    border: none;
    border-radius: 6px;
}

.total {
    font-size: 28px;
    text-align: center;
    margin-top: 10px;
}

.btn-finalizar {
    width: 100%;
    padding: 18px;
    font-size: 20px;
    background: black;
    color: white;
    border-radius: 12px;
    border: none;
    margin-top: 10px;
}
</style>

</head>

<body>

<div class="header">🧾 Caja CHIC PRO FIREBASE v2.3</div>

<div class="container">

<div class="lista-box">
    <div id="lista"></div>
</div>

<div class="total" id="total">$0</div>

<select id="pago" style="width:100%; padding:10px; margin-top:10px;">
    <option>Efectivo</option>
    <option>Transferencia</option>
    <option>Mercado Pago</option>
</select>
    <input 
    type="text" 
    id="nombre" 
    placeholder="Nombre cliente (opcional)"
    style="width:100%; padding:10px; margin-top:10px;"
>

<input 
    type="text" 
    id="bolsa" 
    placeholder="N° de bolsa (opcional)"
    style="width:100%; padding:10px; margin-top:5px;"
>

<input 
    type="text" 
    id="contacto" 
    placeholder="Contacto (opcional)"
    style="width:100%; padding:10px; margin-top:5px;"
>

<!-- 💵 EFECTIVO -->
<div id="efectivoBox" style="margin-top:10px;">
    
    <input 
        type="number" 
        id="pagaCon" 
        placeholder="Paga con..." 
        style="width:100%; padding:10px; margin-bottom:5px;"
        oninput="calcularVuelto()"
    >

    <div id="vuelto" style="font-weight:bold; text-align:center;">
        Vuelto: $0
    </div>

</div>

<button class="btn-finalizar" onclick="finalizarVenta()">
Finalizar Venta
</button>

</div>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCe2I-jg8A3nmVC0fJLxgVlEkjfYzKi3ns",
  authDomain: "chic-pos.firebaseapp.com",
  projectId: "chic-pos",
};

const URL_SHEETS = "https://script.google.com/macros/s/AKfycbzqftjGLBS89N_wp7vf3tPaZyLCljIgyy6DZ6i-snWr7N6rlVeKspAcfWK3JZrfHDyYxg/exec"

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let carrito = []
let total = 0

// 🧠 producto
function getProductoData(codigo) {

    if (codigo.startsWith("N")) return { producto: "CHIC 2.0 Negro", precio: 37000 }

    if (codigo.startsWith("T")) {
        let talle = parseInt(codigo.substring(1))
        if (talle <= 32) return { producto: "CHIC Niño", precio: 25000 }
        return { producto: "CHIC 1.0", precio: 30000 }
    }

    return { producto: "CHIC 2.0", precio: 35000 }
}

// 👂 FIREBASE
let primeraCarga = true
const inicio = Date.now()

db.collection("scanner")
.where("timestamp", ">", inicio)
.onSnapshot(snapshot => {

    if (primeraCarga) {
        primeraCarga = false
        return
    }

    snapshot.docChanges().forEach(change => {

        if (change.type === "added") {

            let codigo = change.doc.data().codigo

            let data = getProductoData(codigo)

            carrito.push({
                producto: data.producto,
                codigo: codigo,
                precio: data.precio
            })

            render()
        }
    })
})

// 🔁 render
function render() {

    if (carrito.length === 0) {
        document.getElementById("lista").innerHTML = `
            <div style="
                background: white;
                padding: 30px;
                border-radius: 12px;
                text-align: center;
                color: #777;
                font-size: 16px;
            ">
                📷 Escaneá productos para comenzar
            </div>
        `
        document.getElementById("total").innerText = "$0"
        return
    }

    let agrupado = {}
    carrito.forEach(item => {
        let key = item.producto + "_" + item.codigo

        if (!agrupado[key]) {
            agrupado[key] = { ...item, cantidad: 1 }
        } else {
            agrupado[key].cantidad++
        }
    })

    let html = ""
    total = 0

    Object.values(agrupado).forEach(item => {

        total += item.precio * item.cantidad

        html += `
        <div class="producto">
            <div>
                ${item.producto} - ${item.codigo}<br>
                Cantidad: 
                <input type="number" value="${item.cantidad}" min="1"
                onchange="cambiarCantidad('${item.codigo}', this.value)">
            </div>
            <div>
                $${item.precio * item.cantidad}
                <br>
                <button class="btn-eliminar" onclick="eliminar('${item.codigo}')">✕</button>
            </div>
        </div>`
    })

    document.getElementById("lista").innerHTML = html
    document.getElementById("total").innerText = "$" + total
}

// 🔢 cantidad
function cambiarCantidad(codigo, cantidad) {

    cantidad = parseInt(cantidad)

    carrito = carrito.filter(item => item.codigo !== codigo)

    for (let i = 0; i < cantidad; i++) {
        let data = getProductoData(codigo)

        carrito.push({
            producto: data.producto,
            codigo: codigo,
            precio: data.precio
        })
    }

    render()
}

// ❌ eliminar
function eliminar(codigo) {

    let index = carrito.findIndex(p => p.codigo === codigo)

    if (index !== -1) {
        carrito.splice(index, 1)
    }

    render()
}

// 💰 vuelto
function calcularVuelto() {

    let metodo = document.getElementById("pago").value
    let box = document.getElementById("efectivoBox")

    if (metodo === "Efectivo") {
        box.style.display = "block"

        let paga = parseFloat(document.getElementById("pagaCon").value) || 0
        let vuelto = paga - total

        if (vuelto < 0) {
            document.getElementById("vuelto").innerText = "Faltan $" + Math.abs(vuelto)
        } else {
            document.getElementById("vuelto").innerText = "Vuelto: $" + vuelto
        }

    } else {
        box.style.display = "none"
    }
}

// detectar cambio pago
document.getElementById("pago").addEventListener("change", calcularVuelto)

// 💳 finalizar
function finalizarVenta() {

    let nombre = document.getElementById("nombre").value
    let bolsa = document.getElementById("bolsa").value
    let contacto = document.getElementById("contacto").value

    if (carrito.length === 0) return

    let pago = document.getElementById("pago").value

    let agrupado = {}

    carrito.forEach(item => {
        let key = item.producto + "_" + item.codigo

        if (!agrupado[key]) {
            agrupado[key] = { ...item, cantidad: 1 }
        } else {
            agrupado[key].cantidad++
        }
    })

    let itemsFinal = Object.values(agrupado)

    fetch(URL_SHEETS, {
        method: "POST",
        body: JSON.stringify({
            items: itemsFinal,
            total: total,
            pago: pago,
            nombre: nombre,
            bolsa: bolsa,
            contacto: contacto
        })
    })

    alert("Venta registrada ✅ Total: $" + total)

    carrito = []
    render()

    // 🔥 RESET EFECTIVO
    document.getElementById("pagaCon").value = ""
    document.getElementById("vuelto").innerText = "Vuelto: $0"

    // 🆕 RESET DATOS CLIENTE (ACA VA)
    document.getElementById("nombre").value = ""
    document.getElementById("bolsa").value = ""
    document.getElementById("contacto").value = ""

    // 🧹 limpiar Firebase
    db.collection("scanner").get().then(snapshot => {
        snapshot.forEach(doc => doc.ref.delete())
    })
}

</script>

</body>
</html>
