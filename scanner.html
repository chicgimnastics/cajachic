<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/@zxing/library@latest"></script>

<!-- Firebase COMPAT -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>

<body>

<h2>📷 Scanner CHIC FIREBASE V1 </h2>
<p id="status">Escaneá un producto</p>
<video id="video" width="300"></video>

<script>

// 🔥 TU CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCe2I-jg8A3nmVC0fJLxgVlEkjfYzKi3ns",
  authDomain: "chic-pos.firebaseapp.com",
  projectId: "chic-pos",
  storageBucket: "chic-pos.firebasestorage.app",
  messagingSenderId: "136052805362",
  appId: "1:136052805362:web:82ede68bef94a0d497ca6b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const codeReader = new ZXing.BrowserMultiFormatReader()
const video = document.getElementById('video')

let lastCode = null

function beep() {
    new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play()
}

function enviar(codigo) {

    db.collection("scanner").add({
        codigo: codigo,
        timestamp: Date.now()
    })

    document.getElementById("status").innerText = "✅ " + codigo
    beep()
}

function startScanner() {

    codeReader.decodeFromVideoDevice(null, video, (result) => {

        if (result) {

            let codigo = result.text.trim()

            if (!codigo || codigo === lastCode) return

            lastCode = codigo

            enviar(codigo)

            setTimeout(() => {
                lastCode = null
            }, 500)
        }
    })
}

startScanner()

</script>

</body>
</html>
