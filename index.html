// 🧠 producto
function getProductoData(codigo) {

    // 1️⃣ buscar por talle directo (zapatillas)
    for (let nombre in PRODUCTOS) {
        let prod = PRODUCTOS[nombre]

        if (prod.talles && prod.talles.includes(codigo)) {
            return {
                producto: nombre,
                precio: prod.precio
            }
        }
    }

    // 2️⃣ detectar formato "Producto Talle"
    let partes = codigo.split(" ")
    let talle = partes.pop() // último valor
    let nombreProducto = partes.join(" ")

    if (PRODUCTOS[nombreProducto]) {
        let prod = PRODUCTOS[nombreProducto]

        if (prod.talles && prod.talles.includes(talle)) {
            return {
                producto: nombreProducto,
                precio: prod.precio
            }
        }
    }

    // 3️⃣ coincidencia exacta (sin talle)
    if (PRODUCTOS[codigo]) {
        return {
            producto: codigo,
            precio: PRODUCTOS[codigo].precio
        }
    }

    // 4️⃣ fallback
    return {
        producto: "Producto desconocido",
        precio: 0
    }
}

// 👂 FIREBASE

const inicio = firebase.firestore.Timestamp.now()
let scansProcesados = {}

db.collection("scanner").onSnapshot(snapshot => {

    snapshot.docChanges().forEach(change => {

        if (change.type !== "added") return

        let doc = change.doc
        let dataScan = doc.data()

        let codigo = dataScan.codigo
        let timestamp = dataScan.timestamp || 0

        if (!codigo) return
        if (timestamp && timestamp.toMillis && timestamp.toMillis() < inicio.toMillis()) return

function generarListaManual() {
    let lista = []

    // 1️⃣ Productos definidos en PRODUCTOS
    for (let nombre in PRODUCTOS) {
        let prod = PRODUCTOS[nombre]

        if (prod.talles) {
            prod.talles.forEach(talle => {

                let codigoStock = nombre + " " + talle

                if (nombre === "CHIC Niño") codigoStock = talle
                if (nombre === "CHIC 1.0") codigoStock = talle
                if (nombre === "CHIC 2.0") codigoStock = talle
                if (nombre === "CHIC 2.0 Negro") codigoStock = talle

                lista.push({
                    texto: nombre + " " + talle,
                    codigo: codigoStock,
                    producto: nombre,
                    precio: prod.precio
                })
            })
        } else {
            lista.push({
                texto: nombre,
                codigo: nombre,
                producto: nombre,
                precio: prod.precio
            })
        }
    }

    // 2️⃣ Productos nuevos que existen en Firebase stock
    for (let codigo in stockDB) {

        let yaExiste = lista.some(item => item.codigo === codigo)

        if (!yaExiste) {
            lista.push({
                texto: codigo,
                codigo: codigo,
                producto: codigo,
                precio: 0
            })
        }
    }

    return lista
}

    )

option.textContent = item.texto + " - $" + item.precio
option.setAttribute("data-producto", item.producto)
option.setAttribute("data-precio", item.precio)
select.appendChild(option)
    })
}

function agregarManual() {
    let select = document.getElementById("resultadoManual")
    let codigo = select.value

    if (!codigo) {
        alert("Seleccioná un producto primero")
        return
    }

    let selectedOption = select.options[select.selectedIndex]

    let producto = selectedOption.getAttribute("data-producto")
    let precio = parseFloat(selectedOption.getAttribute("data-precio")) || 0

    if (precio === 0) {
        precio = parseFloat(prompt("Este producto no tiene precio cargado. Ingresá el precio:")) || 0
    }

    if (precio <= 0) {
        alert("Precio inválido")
        return
    }

    let stock = stockDB[codigo] ?? 0
    let cantidadEnCarrito = carrito.filter(p => p.codigo === codigo).length

    if (stock === 0) {
        alert("❌ Sin stock de " + codigo)
        return
    }

    if (cantidadEnCarrito >= stock) {
        alert("⚠️ Ya agregaste todo el stock disponible")
        return
    }

    carrito.push({
        producto: producto,
        codigo: codigo,
        precio: precio,
        manual: true
    })

    document.getElementById("buscadorManual").value = ""
    document.getElementById("resultadoManual").innerHTML = `<option value="">Buscar producto...</option>`

    render()
}

// 💰 vuelto
function calcularVuelto() {

    let metodo = document.getElementById("pago").value
    let box = document.getElementById("efectivoBox")

    if (metodo === "Efectivo") {

        box.style.display = "block"

        let paga = parseFloat(document.getElementById("pagaCon").value) || 0
        let vuelto = paga - totalFinal

        if (paga === 0) {
            document.getElementById("vuelto").innerText = "Ingresá monto"
            return
        }

        if (vuelto < 0) {
            document.getElementById("vuelto").innerText = "Faltan $" + formatoPesos(Math.abs(vuelto))
        } else if (vuelto === 0) {
            document.getElementById("vuelto").innerText = "Pago exacto ✔️"
        } else {
            document.getElementById("vuelto").innerText = "Vuelto: $" + formatoPesos(vuelto)
        }

    } else {

        box.style.display = "none"

        // 🔥 reset visual cuando cambia método
        document.getElementById("pagaCon").value = ""
        document.getElementById("vuelto").innerText = "Vuelto: $0"
    }
}

function finalizarVenta() {

    let nombre = document.getElementById("nombre").value
    let bolsa = document.getElementById("bolsa").value
    let contacto = document.getElementById("contacto").value

    if (carrito.length === 0) return

    let pago = document.getElementById("pago").value

    let agrupado = {}

    carrito.forEach(item => {
        let key = item.producto + "_" + item.codigo

        if (!agrupado[key]) {
            agrupado[key] = { ...item, cantidad: 1 }
        } else {
            agrupado[key].cantidad++
        }
    })

    let itemsFinal = Object.values(agrupado)

    fetch(URL_SHEETS, {
        method: "POST",
        body: JSON.stringify({
            items: itemsFinal,
            total: totalFinal,
            pago: pago,
            nombre: nombre,
            bolsa: bolsa,
            contacto: contacto
        })
    })

    // 🔥 DESCONTAR STOCK EN FIREBASE
itemsFinal.forEach(item => {

    let ref = db.collection("stock").doc(item.codigo)

    db.runTransaction(async (transaction) => {

        let doc = await transaction.get(ref)

        if (!doc.exists) return

        let stockActual = doc.data().stock
        let nuevoStock = stockActual - item.cantidad

        if (nuevoStock < 0) nuevoStock = 0

        transaction.update(ref, {
            stock: nuevoStock
        })
    })

})

    alert("Venta registrada ✅ Total: $" + formatoPesos(totalFinal))

    carrito = []
    render()

    // 🔥 RESET EFECTIVO
    document.getElementById("pagaCon").value = ""
    document.getElementById("vuelto").innerText = "Vuelto: $0"

    // 🆕 RESET DATOS CLIENTE (ACA VA)
    document.getElementById("nombre").value = ""
    document.getElementById("bolsa").value = ""
    document.getElementById("contacto").value = ""

    // 🧹 limpiar Firebase
    db.collection("scanner").get().then(snapshot => {
        snapshot.forEach(doc => doc.ref.delete())
    })
}

        if (stock === 0 || cantidad > stock) {
            return true
        }
    }

    return false
}
