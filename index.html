<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
}

.header {
    background: black;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

#video {
    width: 100%;
    max-height: 220px;
    object-fit: cover;
}

.container {
    padding: 15px;
}

.status {
    text-align: center;
    margin: 10px 0;
    font-weight: bold;
}

.producto {
    background: white;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.info {
    font-size: 14px;
}

.cantidad {
    font-size: 12px;
    color: gray;
}

.precio {
    font-weight: bold;
}

.btn-eliminar {
    background: red;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 5px 8px;
}

.total-box {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-top: 10px;
    text-align: center;
}

.total {
    font-size: 28px;
    font-weight: bold;
}

.btn-finalizar {
    width: 100%;
    margin-top: 10px;
    padding: 18px;
    font-size: 20px;
    background: black;
    color: white;
    border: none;
    border-radius: 12px;
}
</style>

</head>

<body>

<div class="header">🧾 Caja CHIC PRO</div>

<video id="video"></video>

<div class="container">

<div id="status" class="status">📷 Escaneá un producto</div>

<div id="lista"></div>

<div class="total-box">
    <div>Total</div>
    <div id="total" class="total">$0</div>
</div>

<button class="btn-finalizar" onclick="finalizarVenta()">
Finalizar Venta
</button>

</div>

<script>

const codeReader = new ZXing.BrowserMultiFormatReader()
const video = document.getElementById('video')

let scanning = true
let lastCode = null
let total = 0
let carrito = []

function beep() {
    const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg")
    audio.play()
}

function procesarCodigo(codigo) {

    codigo = codigo.toUpperCase().trim()

    let precio = 0
    let producto = ""

    if (codigo.startsWith("N")) {
        producto = "CHIC 2.0 Negro"
        precio = 37000
    } 
    else if (codigo.startsWith("T")) {

        let talle = parseInt(codigo.substring(1))

        if (talle >= 27 && talle <= 32) {
            producto = "CHIC Niño"
            precio = 25000
        } else {
            producto = "CHIC 1.0"
            precio = 30000
        }
    } 
    else {
        producto = "CHIC 2.0"
        precio = 35000
    }

    total += precio

    carrito.push({ producto, codigo, precio })

    renderLista()

    document.getElementById("total").innerText = "$" + total
    document.getElementById("status").innerText = "✅ " + codigo

    beep()
}

function renderLista() {

    let agrupado = {}

    carrito.forEach(item => {
        let key = item.producto + "_" + item.codigo

        if (!agrupado[key]) {
            agrupado[key] = { ...item, cantidad: 1 }
        } else {
            agrupado[key].cantidad++
        }
    })

    let html = ""

    Object.values(agrupado).forEach(item => {
        html += `
        <div class="producto">
            <div class="info">
                ${item.producto} - ${item.codigo}
                <div class="cantidad">x${item.cantidad}</div>
            </div>
            <div>
                <div class="precio">$${item.precio * item.cantidad}</div>
                <button class="btn-eliminar" onclick="eliminar('${item.codigo}')">✕</button>
            </div>
        </div>`
    })

    document.getElementById("lista").innerHTML = html
}

function eliminar(codigo) {

    let index = carrito.findIndex(p => p.codigo === codigo)

    if (index !== -1) {
        total -= carrito[index].precio
        carrito.splice(index, 1)
    }

    renderLista()
    document.getElementById("total").innerText = "$" + total
}

function startScanner() {

    codeReader.decodeFromVideoDevice(null, video, (result, err) => {

        if (result && scanning) {

            let codigo = result.text.trim()

            if (!codigo) return
            if (codigo === lastCode) return

            lastCode = codigo
            scanning = false

            procesarCodigo(codigo)

            setTimeout(() => {
                scanning = true
            }, 250)
        }
    })
}

function finalizarVenta() {

    if (carrito.length === 0) return

    fetch("https://script.google.com/macros/s/AKfycbzqftjGLBS89N_wp7vf3tPaZyLCljIgyy6DZ6i-snWr7N6rlVeKspAcfWK3JZrfHDyYxg/exec", {
        method: "POST",
        body: JSON.stringify({
            items: carrito,
            total: total
        })
    })

    alert("Venta registrada ✅ Total: $" + total)

    carrito = []
    total = 0
    lastCode = null

    document.getElementById("lista").innerHTML = ""
    document.getElementById("total").innerText = "$0"
    document.getElementById("status").innerText = "📷 Escaneá un producto"
}

startScanner()

</script>

</body>
</html>
