<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    padding: 15px;
}

h2 {
    text-align: center;
}

.item {
    background: white;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

input {
    width: 60px;
    padding: 5px;
    text-align: center;
}

.btn-agregar {
    width: 100%;
    padding: 14px;
    background: black;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.btn-agregar:hover {
    background: #222;
    transform: scale(1.02);
}    

    .btn-eliminar {
    background: transparent;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 6px 10px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.btn-eliminar:hover {
    background: #ff4d4d;
    color: white;
    border-color: #ff4d4d;
}

    .producto {  
    background: white;  
    border-radius: 12px;  
    padding: 12px;  
    margin-bottom: 10px;  
    display: flex;  
    justify-content: space-between;  
    align-items: center;  
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);  
}
</style>
</head>

<body>

<h2>📦 Stock CHIC v2.3</h2>
     <button class="btn-agregar" onclick="agregarProducto()">
    ➕ Agregar producto
</button>
<div style="max-width:500px; margin:0 auto;">

    <button onclick="resetearStock()" 
    style="width:100%; padding:14px; background:red; color:white; border:none; border-radius:12px; font-weight:bold; margin-top:10px;">
        ⚠️ Poner TODO el stock en 0
    </button>

    <input 
        type="text" 
        id="buscador"
        placeholder="🔍 Buscar talle..."
        style="width:100%; padding:12px; border-radius:12px; border:1px solid #ccc; margin-top:10px;"
    >

</div>

<div id="lista"></div>

  

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCe2I-jg8A3nmVC0fJLxgVlEkjfYzKi3ns",
  authDomain: "chic-pos.firebaseapp.com",
  projectId: "chic-pos",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let stockData = []

// 👂 escuchar stock
db.collection("stock").onSnapshot(snapshot => {

    stockData = []

    snapshot.forEach(doc => {
        stockData.push({
            codigo: doc.id,
            stock: doc.data().stock
        })
    })

    renderStock()
})

// 🔁 render
function renderStock() {

    let buscador = document.getElementById("buscador").value.toLowerCase()
    let html = ""

    stockData.forEach(item => {

        if (!item.codigo.toLowerCase().includes(buscador)) return

        let stock = item.stock ?? 0

        html += `
        <div class="item">
            <div>
                ${item.codigo}<br>

                Stock:
                <input 
                    type="number" 
                    value="${stock}" 
                    onchange="actualizarStock('${item.codigo}', this.value)"
                    style="width:60px;"
                >
            </div>

            <div>
                <button class="btn-eliminar" onclick="eliminarProducto('${item.codigo}')">
    🗑️
</button>
            </div>
        </div>
        `
    })

    document.getElementById("lista").innerHTML = html
}

// 🔄 actualizar stock
function actualizarStock(codigo, valor) {

    db.collection("stock").doc(codigo).update({
        stock: parseInt(valor)
    })
}

// ➕ Sumar Producto    


    function agregarProducto() {

    let codigo = prompt("Código del producto (ej: 35, N38, Remera Negro M)")

    if (!codigo) return

    let cantidad = parseInt(prompt("Cantidad a sumar")) || 0

    if (cantidad <= 0) {
        alert("Cantidad inválida")
        return
    }

    let ref = db.collection("stock").doc(codigo)

    ref.get().then(doc => {

        if (doc.exists) {

            let stockActual = doc.data().stock || 0

            ref.update({
                stock: stockActual + cantidad
            })

        } else {

            // 🔥 si no existe, lo crea
            ref.set({
                stock: cantidad
            })
        }

    })

}

    // Eliminar Producto

    function eliminarProducto(codigo) {

    let ok = confirm("¿Eliminar " + codigo + "?")

    if (!ok) return

    db.collection("stock").doc(codigo).delete()
}

    // Resetear producto

    function resetearStock() {

    let confirmar = confirm("⚠️ ¿Seguro que querés poner TODO el stock en 0?")

    if (!confirmar) return

    db.collection("stock").get().then(snapshot => {

        let batch = db.batch()

        snapshot.forEach(doc => {
            let ref = db.collection("stock").doc(doc.id)

            batch.update(ref, {
                stock: 0
            })
        })

        batch.commit().then(() => {
            alert("✅ Todo el stock fue puesto en 0")
        })
    })
}
    

</script>

</body>
</html>
