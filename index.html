<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

.header {
    background: black;
    color: white;
    padding: 15px;
    text-align: center;
}

.container {
    padding: 15px;
}

.producto {
    background: white;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
}

.btn-eliminar {
    background: red;
    color: white;
    border: none;
    border-radius: 6px;
}

.total {
    font-size: 28px;
    text-align: center;
    margin-top: 10px;
}

.btn-finalizar {
    width: 100%;
    padding: 18px;
    font-size: 20px;
    background: black;
    color: white;
    border-radius: 12px;
    border: none;
    margin-top: 10px;
}
</style>

</head>

<body>

<div class="header">🧾 Caja CHIC PRO FIREBASE v1.2</div>

<div class="container">

<div id="lista"></div>

<div class="total" id="total">$0</div>

<select id="pago" style="width:100%; padding:10px; margin-top:10px;">
    <option>Efectivo</option>
    <option>Transferencia</option>
    <option>Mercado Pago</option>
</select>

<button class="btn-finalizar" onclick="finalizarVenta()">
Finalizar Venta
</button>

</div>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCe2I-jg8A3nmVC0fJLxgVlEkjfYzKi3ns",
  authDomain: "chic-pos.firebaseapp.com",
  projectId: "chic-pos",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let carrito = []
let total = 0

// 🧠 producto
function getProductoData(codigo) {

    if (codigo.startsWith("N")) return { producto: "CHIC 2.0 Negro", precio: 37000 }

    if (codigo.startsWith("T")) {
        let talle = parseInt(codigo.substring(1))
        if (talle <= 32) return { producto: "CHIC Niño", precio: 25000 }
        return { producto: "CHIC 1.0", precio: 30000 }
    }

    return { producto: "CHIC 2.0", precio: 35000 }
}

// 👂 escucha realtime
const inicio = Date.now()

db.collection("scanner")
.where("timestamp", ">", inicio)
.onSnapshot(snapshot => {

    snapshot.docChanges().forEach(change => {

        if (change.type === "added") {

            let codigo = change.doc.data().codigo

            let data = getProductoData(codigo)

            carrito.push({
                producto: data.producto,
                codigo: codigo,
                precio: data.precio
            })

            render()
        }
    })
})

// 🔁 render
function render() {

    let agrupado = {}

    carrito.forEach(item => {
        let key = item.producto + "_" + item.codigo

        if (!agrupado[key]) {
            agrupado[key] = { ...item, cantidad: 1 }
        } else {
            agrupado[key].cantidad++
        }
    })

    let html = ""
    total = 0

    Object.values(agrupado).forEach(item => {

        total += item.precio * item.cantidad

        html += `
        <div class="producto">
            <div>
                ${item.producto} - ${item.codigo}<br>
                Cantidad: 
                <input type="number" value="${item.cantidad}" min="1"
                onchange="cambiarCantidad('${item.codigo}', this.value)">
            </div>
            <div>
                $${item.precio * item.cantidad}
                <br>
                <button class="btn-eliminar" onclick="eliminar('${item.codigo}')">✕</button>
            </div>
        </div>`
    })

    document.getElementById("lista").innerHTML = html
    document.getElementById("total").innerText = "$" + total
}

// 🔢 cambiar cantidad
function cambiarCantidad(codigo, cantidad) {

    cantidad = parseInt(cantidad)

    carrito = carrito.filter(item => item.codigo !== codigo)

    for (let i = 0; i < cantidad; i++) {
        let data = getProductoData(codigo)

        carrito.push({
            producto: data.producto,
            codigo: codigo,
            precio: data.precio
        })
    }

    render()
}

// ❌ eliminar
function eliminar(codigo) {

    let index = carrito.findIndex(p => p.codigo === codigo)

    if (index !== -1) {
        carrito.splice(index, 1)
    }

    render()
}

// 💳 finalizar venta
function finalizarVenta() {

    if (carrito.length === 0) return

    let pago = document.getElementById("pago").value

    alert("Venta registrada ✅ Total: $" + total)

    carrito = []
    render()

    // 🧹 LIMPIAR FIREBASE (CLAVE)
    db.collection("scanner").get().then(snapshot => {
        snapshot.forEach(doc => doc.ref.delete())
    })
}

</script>

</body>
</html>
