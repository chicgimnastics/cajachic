<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/@zxing/library@latest"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>

<body>

<h2>📷 Scanner CHIC FIREBASE v2.2</h2>
<p id="status">Escaneá un producto</p>
<video id="video" width="300"></video>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCe2I-jg8A3nmVC0fJLxgVlEkjfYzKi3ns",
  authDomain: "chic-pos.firebaseapp.com",
  projectId: "chic-pos",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const codeReader = new ZXing.BrowserMultiFormatReader()
const video = document.getElementById('video')

// 🧠 CONTROL INTELIGENTE
let lastCode = null
let lastScanTime = 0
let scanning = true

function beep() {
    new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play()
}

function vibrar() {
    if (navigator.vibrate) navigator.vibrate(100)
}

async function enviar(codigo) {
    document.getElementById("status").innerText = "⏳ Enviando " + codigo

    await db.collection("scanner").add({
        codigo: codigo,
        timestamp: Date.now(),
        scanId: Date.now() + "_" + Math.random().toString(36).substring(2)
    })

    document.getElementById("status").innerText = "✅ Escaneado: " + codigo
    beep()
    vibrar()

    setTimeout(() => {
        document.getElementById("status").innerText = "📷 Listo para escanear otro producto"
    }, 700)
}

function startScanner() {
    codeReader.decodeFromVideoDevice(null, video, async (result) => {

        if (!result || !scanning) return

        let codigo = result.text.trim()
        let now = Date.now()

        if (!codigo) return

        if (codigo === lastCode && (now - lastScanTime) < 1200) return

        scanning = false
        lastCode = codigo
        lastScanTime = now

        try {
            await enviar(codigo)
        } catch (error) {
            document.getElementById("status").innerText = "❌ Error al enviar. Revisá internet."
        }

        setTimeout(() => {
            scanning = true
            lastCode = null
        }, 900)
    })
}

startScanner()

</script>

</body>
</html>
