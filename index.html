<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/@zxing/library@latest"></script>
</head>

<body>

<h2>🧾 Caja CHIC V5</h2>

<p id="status">📷 Escaneá un producto</p>

<video id="video" width="320"></video>

<h3>Productos</h3>
<ul id="lista"></ul>

<h2 id="total">Total: $0</h2>

<button onclick="finalizarVenta()" style="font-size:20px; padding:15px; background:black; color:white; border:none; border-radius:10px;">
Finalizar Venta
</button>

<script>

const codeReader = new ZXing.BrowserMultiFormatReader()
const video = document.getElementById('video')

let scanning = true
let lastCode = null
let total = 0
let carrito = []

// 🔊 beep simple
function beep() {
    const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg")
    audio.play()
}

function procesarCodigo(codigo) {

    codigo = codigo.toUpperCase().trim()

    let precio = 0
    let producto = ""

    if (codigo.startsWith("N")) {
        producto = "CHIC 2.0 Negro"
        precio = 37000
    } 
    else if (codigo.startsWith("T")) {

        let talle = parseInt(codigo.substring(1))

        if (talle >= 27 && talle <= 32) {
            producto = "CHIC Niño"
            precio = 25000
        } else {
            producto = "CHIC 1.0"
            precio = 30000
        }
    } 
    else {
        producto = "CHIC 2.0"
        precio = 35000
    }

    total += precio

    carrito.push({
        producto,
        codigo,
        precio
    })

    renderLista()

    document.getElementById("total").innerText = "Total: $" + total
    document.getElementById("status").innerText = "✅ " + codigo + " agregado"

    beep()
}

// 🔥 agrupa productos y muestra cantidad
function renderLista() {

    let agrupado = {}

    carrito.forEach((item, index) => {
        let key = item.producto + "_" + item.codigo

        if (!agrupado[key]) {
            agrupado[key] = {
                ...item,
                cantidad: 1,
                index: index
            }
        } else {
            agrupado[key].cantidad++
        }
    })

    let html = ""

    Object.values(agrupado).forEach(item => {
        html += `
        <li>
            ${item.producto} - ${item.codigo} x${item.cantidad} - $${item.precio * item.cantidad}
            <button onclick="eliminar('${item.codigo}')">❌</button>
        </li>`
    })

    document.getElementById("lista").innerHTML = html
}

// ❌ eliminar producto (uno por click)
function eliminar(codigo) {

    let index = carrito.findIndex(p => p.codigo === codigo)

    if (index !== -1) {
        total -= carrito[index].precio
        carrito.splice(index, 1)
    }

    renderLista()
    document.getElementById("total").innerText = "Total: $" + total
}

function startScanner() {

    codeReader.decodeFromVideoDevice(null, video, (result, err) => {

        if (result && scanning) {

            let codigo = result.text.trim()

            if (!codigo) return
            if (codigo === lastCode) return

            lastCode = codigo
            scanning = false

            procesarCodigo(codigo)

            setTimeout(() => {
                scanning = true
            }, 250)
        }
    })
}

function finalizarVenta() {

    if (carrito.length === 0) return

    fetch("https://script.google.com/macros/s/AKfycbzqftjGLBS89N_wp7vf3tPaZyLCljIgyy6DZ6i-snWr7N6rlVeKspAcfWK3JZrfHDyYxg/exec", {
        method: "POST",
        body: JSON.stringify({
            items: carrito,
            total: total
        })
    })

    alert("Venta registrada ✅ Total: $" + total)

    // 🔄 reset sin frenar cámara
    carrito = []
    total = 0
    lastCode = null

    document.getElementById("lista").innerHTML = ""
    document.getElementById("total").innerText = "Total: $0"
    document.getElementById("status").innerText = "📷 Escaneá un producto"
}

startScanner()

</script>

</body>
</html>
