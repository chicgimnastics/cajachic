<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/@zxing/library@latest"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>

<body>

<h2>📷 Scanner CHIC FIREBASE v2.1</h2>
<p id="status">Escaneá un producto</p>
<video id="video" width="300"></video>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCe2I-jg8A3nmVC0fJLxgVlEkjfYzKi3ns",
  authDomain: "chic-pos.firebaseapp.com",
  projectId: "chic-pos",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const codeReader = new ZXing.BrowserMultiFormatReader()
const video = document.getElementById('video')

// 🧠 CONTROL INTELIGENTE
let lastCode = null
let lastScanTime = 0
let scanning = true

// 🔊 beep
function beep() {
    new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play()
}

// 📳 vibración (iPhone compatible)
function vibrar() {
    if (navigator.vibrate) {
        navigator.vibrate(100)
    }
}

// 📤 enviar a Firebase
function enviar(codigo) {

    db.collection("scanner").add({
        codigo: codigo,
        timestamp: Date.now()
    })

    document.getElementById("status").innerText = "✅ " + codigo

    beep()
    vibrar()
}

// 📷 scanner
function startScanner() {

    codeReader.decodeFromVideoDevice(null, video, (result) => {

        if (!result || !scanning) return

        let codigo = result.text.trim()
        let now = Date.now()

        // 🚫 ignorar inválidos
        if (!codigo) return

        // 🚫 evitar duplicado inmediato
        if (codigo === lastCode && (now - lastScanTime) < 1500) {
            return
        }

        // 🔒 bloquear lectura rápida
        scanning = false

        lastCode = codigo
        lastScanTime = now

        enviar(codigo)

        // ⏱️ reactivar scanner
        setTimeout(() => {
            scanning = true
        }, 600)
    })
}

startScanner()

</script>

</body>
</html>
