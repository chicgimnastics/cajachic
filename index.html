<!DOCTYPE html>
<html>

<style>
body {
    font-family: Arial;

}

.header {
    background: black;

    text-align: center;
}

.container {
    padding: 15px;
}
    
.lista-box {
    background: white;
    border-radius: 12px;
    padding: 12px;
    min-height: 120px;
    margin-bottom: 10px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.empty {
    text-align: center;
    color: gray;
    font-size: 14px;
}
.producto {
    background: white;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
}

.btn-eliminar {
    background: red;
    color: white;
    border: none;
    border-radius: 6px;
}

.total {
    font-size: 28px;
    text-align: center;
    margin-top: 10px;
}

.btn-finalizar {
    width: 100%;
    padding: 18px;
    font-size: 20px;
    background: black;
    color: white;
    border-radius: 12px;
    border: none;
    margin-top: 10px;
}
</style>

</head>

<body>

<div class="header">🧾 Caja CHIC PRO FIREBASE v2.14</div>

<div class="container">

<div class="lista-box">
    <div id="lista"></div>
</div>

<div class="total" id="total">$0</div>

<select id="pago" style="width:100%; padding:10px; margin-top:10px;">
    <option>Efectivo</option>
    <option>Transferencia</option>
    <option>Mercado Pago</option>
</select>
    <input 
    type="text" 
    id="nombre" 
    placeholder="Nombre cliente (opcional)"
    style="width:100%; padding:10px; margin-top:10px;"
>

<input 
    type="text" 
    id="bolsa" 
    placeholder="N° de bolsa (opcional)"
    style="width:100%; padding:10px; margin-top:5px;"
>

<input 
    type="text" 
    id="contacto" 
    placeholder="Contacto (opcional)"
    style="width:100%; padding:10px; margin-top:5px;"
>

<!-- 💵 EFECTIVO -->
<div id="efectivoBox" style="margin-top:10px;">
    
    <input 
        type="number" 
        id="pagaCon" 
        placeholder="Paga con..." 
        style="width:100%; padding:10px; margin-bottom:5px;"
        oninput="calcularVuelto()"
    >

    <div id="vuelto" style="font-weight:bold; text-align:center;">
        Vuelto: $0
    </div>

</div>

<button class="btn-finalizar" onclick="finalizarVenta()">
Finalizar Venta
</button>

</div>

<script>

   const PRODUCTOS = {

    // 👟 CHIC PRO

    // 🧦 MEDIAS

    "Medias Blancas Azul/Roja": { precio: 13000 },
    "Medias Negras Líneas Blancas": { precio: 13000 },

    // 🛍️ TOTE
    "Tote Bag": { precio: 8500 },

    // 👕 BUZOS
    "Buzo Negro S": { precio: 96000 },
    "Buzo Negro M": { precio: 96000 },
    "Buzo Negro L": { precio: 96000 },
    "Buzo Negro XL": { precio: 96000 },
    "Buzo Negro XXL": { precio: 96000 },

    "Buzo Gris S": { precio: 96000 },
    "Buzo Gris M": { precio: 96000 },
    "Buzo Gris L": { precio: 96000 },
    "Buzo Gris XL": { precio: 96000 },
    "Buzo Gris XXL": { precio: 96000 },

    "Buzo Blanco S": { precio: 96000 },
    "Buzo Blanco M": { precio: 96000 },
    "Buzo Blanco L": { precio: 96000 },
    "Buzo Blanco XL": { precio: 96000 },
    "Buzo Blanco XXL": { precio: 96000 },

    "Buzo Marron S": { precio: 96000 },
    "Buzo Marron M": { precio: 96000 },
    "Buzo Marron L": { precio: 96000 },
    "Buzo Marron XL": { precio: 96000 },
    "Buzo Marron XXL": { precio: 96000 },

    "Buzo Verde Militar S": { precio: 96000 },
    "Buzo Verde Militar M": { precio: 96000 },
    "Buzo Verde Militar L": { precio: 96000 },
    "Buzo Verde Militar XL": { precio: 96000 },
    "Buzo Verde Militar XXL": { precio: 96000 },

    "Buzo Petroleo S": { precio: 96000 },
    "Buzo Petroleo M": { precio: 96000 },
    "Buzo Petroleo L": { precio: 96000 },
    "Buzo Petroleo XL": { precio: 96000 },
    "Buzo Petroleo XXL": { precio: 96000 }

} // ✅ SOLO UN CIERRE

    // 👕 REMERAS CHIC
[
"Blanco","Negro","Azul","Fucsia","Celeste","Rosa","Rojo",
"Verde Militar","Verde Lima","Verde Claro","Morado","Lila",
"Gris Claro","Gris Oscuro","Verde Agua","Rosa Nude","Aqua",
"Azul Petróleo","Marron"
].forEach(color => {

    ["S","M","L","XL","XXL"].forEach(talle => {

        PRODUCTOS[`Remera ${color} ${talle}`] = { precio: 38500 }

    })

})


// 🔑 LLAVEROS
[
"Verde","Rojo","Naranja","Azul","Amarillo","Cuero"
].forEach(color => {
    PRODUCTOS[`Llavero ${color}`] = { precio: 10000 }
})


// 👟 ZAPATILLAS 3.0
["35","36","37","38","39","40","41","42","43"].forEach(talle => {
    PRODUCTOS[`CHIC 3.0 ${talle}`] = { precio: 100000 }
})


// 👚 TOPS
["Piel","Blanco","Negro"].forEach(color => {

    ["6","8","10","12","XS","S","M","L"].forEach(talle => {

        PRODUCTOS[`Top ${color} ${talle}`] = { precio: 53500 }

    })

})


// 🩰 CANCANES DESCANSO
["1","2","3"].forEach(talle => {
    PRODUCTOS[`Cancán Descanso ${talle}`] = { precio: 28500 }
})


// 🩰 CANCANES COMUNES
["0","1","2","3","4"].forEach(talle => {
    PRODUCTOS[`Cancán Común ${talle}`] = { precio: 20000 }
})


// 🧦 MEDIAS COMPETENCIA
PRODUCTOS["Medias Competencia Blancas"] = { precio: 10000 }


// 🖤 CALZAS CORTAS
["6","8","10","12","XS","S","M","L"].forEach(talle => {
    PRODUCTOS[`Calza Corta Negro ${talle}`] = { precio: 53500 }
})


// 🖤 CALZAS LARGAS
["6","8","10","12","XS","S","M","L"].forEach(talle => {
    PRODUCTOS[`Calza Larga Negro ${talle}`] = { precio: 63000 }
})


// 🩴 CHANCLAS
["Blanco","Negro"].forEach(color => {

    ["35/36","37","38","39/40"].forEach(talle => {

        PRODUCTOS[`Chanclas ${color} ${talle}`] = { precio: 55000 }

    })

})
    
    
// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCe2I-jg8A3nmVC0fJLxgVlEkjfYzKi3ns",
  authDomain: "chic-pos.firebaseapp.com",
  projectId: "chic-pos",
};

const URL_SHEETS = "https://script.google.com/macros/s/AKfycbzqftjGLBS89N_wp7vf3tPaZyLCljIgyy6DZ6i-snWr7N6rlVeKspAcfWK3JZrfHDyYxg/exec"

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let carrito = []
let total = 0
let stockDB = {} 
    db.collection("stock").onSnapshot(snapshot => {
    snapshot.forEach(doc => {
        stockDB[doc.id] = doc.data().stock
    })

    render() // 🔄 actualiza UI cuando cambia stock
})

// 🧠 producto
function getProductoData(codigo) {

    // 1️⃣ buscar por talle (zapatillas)
    for (let nombre in PRODUCTOS) {

        let prod = PRODUCTOS[nombre]

        if (prod.talles && prod.talles.includes(codigo)) {
            return {
                producto: nombre,
                precio: prod.precio
            }
        }
    }

    // 2️⃣ buscar coincidencia exacta (ej: "Buzo Negro L")
    if (PRODUCTOS[codigo]) {
        return {
            producto: codigo,
            precio: PRODUCTOS[codigo].precio
        }
    }

    // 3️⃣ fallback
    return {
        producto: "Producto desconocido",
        precio: 0
    }
}

// 👂 FIREBASE

const inicio = Date.now()

db.collection("scanner")
.where("timestamp", ">", inicio)
.onSnapshot(snapshot => {

    snapshot.docChanges().forEach(change => {

        if (change.type === "added") {

            let codigo = change.doc.data().codigo

            if (!codigo) return

            let data = getProductoData(codigo)

            carrito.push({
                producto: data.producto,
                codigo: codigo,
                precio: data.precio
            })
        }
    })

    render()
})

// 🔁 render
function render() {

    // 🟡 estado vacío (SIEMPRE visible desde el inicio)
    if (carrito.length === 0) {
        document.getElementById("lista").innerHTML = `
            <div class="empty">
                📷 Escaneá productos para comenzar
            </div>
        `
        document.getElementById("total").innerText = "$0"
        return
    }

    let agrupado = {}
    let html = ""
    total = 0

    carrito.forEach(item => {
        let key = item.producto + "_" + item.codigo

        if (!agrupado[key]) {
            agrupado[key] = { ...item, cantidad: 1 }
        } else {
            agrupado[key].cantidad++
        }
    })

    Object.values(agrupado).forEach(item => {

        total += item.precio * item.cantidad

        // 🔥 stock seguro (evita romper render)
        let stock = stockDB[item.codigo]
        if (stock === undefined) stock = "-"

        let alerta = ""
        let color = "#000"

        if (stock === 0) {
            alerta = "❌ Sin stock"
            color = "red"
        } else if (stock === 1) {
             alerta = "⚠️ Último par"
             color = "orange"
         } else if (stock <= 3) {
    alerta = "⚠️ Poco stock"
    color = "#cc8400"
      }

        html += `
        <div class="producto">
            <div>
                ${item.producto} - ${item.codigo}<br>

               Stock: <span style="color:${color}; font-weight:bold">${stock}</span>
               ${alerta ? "<br><b style='color:" + color + "'>" + alerta + "</b>" : ""}

                <br>
                Cantidad: 
                <input type="number" value="${item.cantidad}" min="1"
                onchange="cambiarCantidad('${item.codigo}', this.value)">
            </div>

            <div>
                $${item.precio * item.cantidad}
                <br>
                <button class="btn-eliminar" onclick="eliminar('${item.codigo}')">✕</button>
            </div>
        </div>`
    })

    document.getElementById("lista").innerHTML = html
    document.getElementById("total").innerText = "$" + total

    let btn = document.querySelector(".btn-finalizar")

if (hayErrorStock()) {
    btn.disabled = true
    btn.style.background = "gray"
    btn.innerText = "❌ Revisar stock"
} else {
    btn.disabled = false
    btn.style.background = "black"
    btn.innerText = "Finalizar Venta"
}
}

// 🔢 cantidad
function cambiarCantidad(codigo, cantidad) {

    cantidad = parseInt(cantidad)

    carrito = carrito.filter(item => item.codigo !== codigo)

    for (let i = 0; i < cantidad; i++) {
        let data = getProductoData(codigo)

        let stock = stockDB[codigo] ?? 0

// ❌ BLOQUEAR SI NO HAY STOCK
if (stock === 0) {
    alert("❌ Sin stock de " + codigo)
    return
}

// ⚠️ BLOQUEAR SI YA TENÉS TODO EL STOCK EN CARRITO
let cantidadEnCarrito = carrito.filter(p => p.codigo === codigo).length

if (cantidadEnCarrito >= stock) {
    alert("⚠️ Ya agregaste todo el stock disponible")
    return
}

// ✅ agregar si hay stock
carrito.push({
    producto: data.producto,
    codigo: codigo,
    precio: data.precio
})
    }

    render()
}

// ❌ eliminar
function eliminar(codigo) {

    let index = carrito.findIndex(p => p.codigo === codigo)

    if (index !== -1) {
        carrito.splice(index, 1)
    }

    render()
}

// 💰 vuelto
function calcularVuelto() {

    let metodo = document.getElementById("pago").value
    let box = document.getElementById("efectivoBox")

    if (metodo === "Efectivo") {
        box.style.display = "block"

        let paga = parseFloat(document.getElementById("pagaCon").value) || 0
        let vuelto = paga - total

        if (vuelto < 0) {
            document.getElementById("vuelto").innerText = "Faltan $" + Math.abs(vuelto)
        } else {
            document.getElementById("vuelto").innerText = "Vuelto: $" + vuelto
        }

    } else {
        box.style.display = "none"
    }
}

// detectar cambio pago
document.getElementById("pago").addEventListener("change", calcularVuelto)

// 💳 finalizar
function finalizarVenta() {

    let nombre = document.getElementById("nombre").value
    let bolsa = document.getElementById("bolsa").value
    let contacto = document.getElementById("contacto").value

    if (carrito.length === 0) return

    let pago = document.getElementById("pago").value

    let agrupado = {}

    carrito.forEach(item => {
        let key = item.producto + "_" + item.codigo

        if (!agrupado[key]) {
            agrupado[key] = { ...item, cantidad: 1 }
        } else {
            agrupado[key].cantidad++
        }
    })

    let itemsFinal = Object.values(agrupado)

    fetch(URL_SHEETS, {
        method: "POST",
        body: JSON.stringify({
            items: itemsFinal,
            total: total,
            pago: pago,
            nombre: nombre,
            bolsa: bolsa,
            contacto: contacto
        })
    })

    // 🔥 DESCONTAR STOCK EN FIREBASE
itemsFinal.forEach(item => {

    let ref = db.collection("stock").doc(item.codigo)

    db.runTransaction(async (transaction) => {

        let doc = await transaction.get(ref)

        if (!doc.exists) return

        let stockActual = doc.data().stock
        let nuevoStock = stockActual - item.cantidad

        if (nuevoStock < 0) nuevoStock = 0

        transaction.update(ref, {
            stock: nuevoStock
        })
    })

})

    alert("Venta registrada ✅ Total: $" + total)

    carrito = []
    render()

    // 🔥 RESET EFECTIVO
    document.getElementById("pagaCon").value = ""
    document.getElementById("vuelto").innerText = "Vuelto: $0"

    // 🆕 RESET DATOS CLIENTE (ACA VA)
    document.getElementById("nombre").value = ""
    document.getElementById("bolsa").value = ""
    document.getElementById("contacto").value = ""

    // 🧹 limpiar Firebase
    db.collection("scanner").get().then(snapshot => {
        snapshot.forEach(doc => doc.ref.delete())
    })
}
    
function hayErrorStock() {

    let agrupado = {}

    carrito.forEach(item => {
        if (!agrupado[item.codigo]) {
            agrupado[item.codigo] = 1
        } else {
            agrupado[item.codigo]++
        }
    })

    for (let codigo in agrupado) {

        let cantidad = agrupado[codigo]
        let stock = stockDB[codigo] ?? 0

        if (stock === 0 || cantidad > stock) {
            return true
        }
    }

    return false
}
render()
</script>

</html>
