<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Firebase COMPAT -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>

<body>

<h2>🧾 Caja CHIC FIREBASE v1</h2>

<div id="lista"></div>
<h2 id="total">$0</h2>

<script>

// 🔥 MISMA CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCe2I-jg8A3nmVC0fJLxgVlEkjfYzKi3ns",
  authDomain: "chic-pos.firebaseapp.com",
  projectId: "chic-pos",
  storageBucket: "chic-pos.firebasestorage.app",
  messagingSenderId: "136052805362",
  appId: "1:136052805362:web:82ede68bef94a0d497ca6b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let total = 0

function getProductoData(codigo) {

    if (codigo.startsWith("N")) return { producto: "CHIC 2.0 Negro", precio: 37000 }

    if (codigo.startsWith("T")) {
        let talle = parseInt(codigo.substring(1))
        if (talle <= 32) return { producto: "CHIC Niño", precio: 25000 }
        return { producto: "CHIC 1.0", precio: 30000 }
    }

    return { producto: "CHIC 2.0", precio: 35000 }
}

// 👂 TIEMPO REAL SIN DELAY
db.collection("scanner")
.orderBy("timestamp", "desc")
.limit(1)
.onSnapshot(snapshot => {

    snapshot.docChanges().forEach(change => {

        if (change.type === "added") {

            let codigo = change.doc.data().codigo

            let data = getProductoData(codigo)

            total += data.precio

            document.getElementById("lista").innerHTML += 
                `<p>${data.producto} - ${codigo} - $${data.precio}</p>`

            document.getElementById("total").innerText = "$" + total
        }
    })
})

</script>

</body>
</html>
