<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* 🔥 MISMO DISEÑO TUYO (NO TOCO NADA) */
body { font-family: Arial; margin: 0; background: #f5f5f5; }
.header { background: black; color: white; padding: 15px; text-align: center; }
.container { padding: 15px; }
.producto { background: white; border-radius: 12px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; }
.total-box { background: white; padding: 15px; border-radius: 12px; text-align: center; }
.total { font-size: 28px; font-weight: bold; }
.btn-finalizar { width:100%; padding:18px; font-size:20px; background:black; color:white; border:none; border-radius:12px;}
</style>

</head>

<body>

<div class="header">🧾 Caja CHIC PRO 3.2(Pantalla)</div>

<div class="container">

<div id="status">📡 Esperando scanner...</div>

<div id="lista"></div>

<div class="total-box">
<div>Total</div>
<div id="total" class="total">$0</div>
</div>

<select id="pago">
<option>Efectivo</option>
<option>Transferencia</option>
<option>Mercado Pago</option>
</select>

<button class="btn-finalizar" onclick="finalizarVenta()">Finalizar Venta</button>

</div>

<script>

let carrito = []
let total = 0
let ultimaFila = 0

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzqftjGLBS89N_wp7vf3tPaZyLCljIgyy6DZ6i-snWr7N6rlVeKspAcfWK3JZrfHDyYxg/exec"

// 🔊 beep
function beep() {
    const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg")
    audio.play()
}

// 🧠 lógica productos (igual que ya tenías)
function getProductoData(codigo) {

    if (codigo.startsWith("N")) return { producto:"CHIC 2.0 Negro", precio:37000 }

    if (codigo.startsWith("T")) {
        let t = parseInt(codigo.substring(1))
        return (t<=32) ? { producto:"CHIC Niño", precio:25000 } : { producto:"CHIC 1.0", precio:30000 }
    }

    return { producto:"CHIC 2.0", precio:35000 }
}

// 🟢 AGREGA PRODUCTO (MISMO SISTEMA)
function procesarCodigo(codigo) {

    let data = getProductoData(codigo)

    carrito.push({
        producto:data.producto,
        codigo:codigo,
        precio:data.precio
    })

    recalcularTotal()
    renderLista()
    beep()
}

// 🔁 ESCUCHAR SCANNER
async function escucharScanner() {

    let res = await fetch(SCRIPT_URL)
    let data = await res.json()

    let nuevos = data.slice(ultimaFila)

    nuevos.forEach(row => {
        let codigo = row[1]
        if (codigo) procesarCodigo(codigo)
    })

    ultimaFila = data.length
}

setInterval(escucharScanner, 400)

// 🔁 resto igual
function recalcularTotal() {
    total = carrito.reduce((acc, i)=>acc+i.precio,0)
    document.getElementById("total").innerText = "$"+total
}

function renderLista() {

    let html = ""

    carrito.forEach(item=>{
        html += `<div class="producto">
        ${item.producto} - ${item.codigo} - $${item.precio}
        </div>`
    })

    document.getElementById("lista").innerHTML = html
}

// 💳 FINALIZAR
function finalizarVenta() {

    let pago = document.getElementById("pago").value

    fetch(SCRIPT_URL,{
        method:"POST",
        body:JSON.stringify({
            tipo:"venta",
            items:carrito,
            total:total,
            pago:pago
        })
    })

    alert("Venta registrada ✅")

    carrito=[]
    total=0
    renderLista()
    recalcularTotal()
}

</script>

</body>
</html>
