<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    padding: 15px;
}

h2 {
    text-align: center;
}

.item {
    background: white;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

input {
    width: 60px;
    padding: 5px;
    text-align: center;
}
</style>
</head>

<body>

<h2>📦 Stock CHIC v1.6</h2>
      <button onclick="agregarProducto()" style="margin-bottom:10px;">
➕ Agregar producto
</button>

   

<!-- 🔍 BUSCADOR (AHORA SÍ EN EL BODY) -->
<input 
    type="text" 
    id="buscador" 
    placeholder="🔍 Buscar talle..."
    style="width:100%; padding:10px; margin-bottom:10px;"
    oninput="renderStock()"
>

<div id="lista"></div>

  

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCe2I-jg8A3nmVC0fJLxgVlEkjfYzKi3ns",
  authDomain: "chic-pos.firebaseapp.com",
  projectId: "chic-pos",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let stockData = []

// 👂 escuchar stock
db.collection("stock").onSnapshot(snapshot => {

    stockData = []

    snapshot.forEach(doc => {
        stockData.push({
            codigo: doc.id,
            stock: doc.data().stock
        })
    })

    renderStock()
})

// 🔁 render
function renderStock() {

    let buscador = document.getElementById("buscador").value.toLowerCase()

    let html = ""

    stockData.forEach(item => {

        if (!item.codigo.toLowerCase().includes(buscador)) return

        hhtml += `
<div class="item">
    <div>
        ${item.codigo}<br>

        Stock:
        <input 
            type="number" 
            value="${item.stock}" 
            onchange="actualizarStock('${item.codigo}', this.value)"
        >
    </div>

    <div>
        <button onclick="eliminarProducto('${item.codigo}')" style="background:red; color:white;">
            🗑️
        </button>
    </div>
</div>
`
`
    })

    document.getElementById("lista").innerHTML = html
}

// 🔄 actualizar stock
function actualizarStock(codigo, valor) {

    db.collection("stock").doc(codigo).update({
        stock: parseInt(valor)
    })
}

// ➕ Sumar Producto    


    function agregarProducto() {

    let codigo = prompt("Código del producto (ej: 35, N38, Remera Negro M)")

    if (!codigo) return

    let cantidad = parseInt(prompt("Cantidad a sumar")) || 0

    if (cantidad <= 0) {
        alert("Cantidad inválida")
        return
    }

    let ref = db.collection("stock").doc(codigo)

    ref.get().then(doc => {

        if (doc.exists) {

            let stockActual = doc.data().stock || 0

            ref.update({
                stock: stockActual + cantidad
            })

        } else {

            // 🔥 si no existe, lo crea
            ref.set({
                stock: cantidad
            })
        }

    })

}

    // Eliminar Producto

    function eliminarProducto(codigo) {

    let ok = confirm("¿Eliminar " + codigo + "?")

    if (!ok) return

    db.collection("stock").doc(codigo).update({
        stock: 0
    })
}
    

</script>

</body>
</html>
