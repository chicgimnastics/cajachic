<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/@zxing/library@latest"></script>
</head>

<body>

<h2>📷 Scanner CHIC 1</h2>

<p id="status">Escaneando...</p>

<video id="video" width="100%"></video>

<script>

const codeReader = new ZXing.BrowserMultiFormatReader()
const video = document.getElementById('video')
const status = document.getElementById('status')

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzqftjGLBS89N_wp7vf3tPaZyLCljIgyy6DZ6i-snWr7N6rlVeKspAcfWK3JZrfHDyYxg/exec"

let lastCode = null

function beep() {
    const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg")
    audio.play()
}

codeReader.decodeFromVideoDevice(null, video, (result) => {

    if (result) {

        let codigo = result.text.trim()

        if (codigo === lastCode) return
        lastCode = codigo

        fetch(SCRIPT_URL,{
            method:"POST",
            body:JSON.stringify({
                tipo:"scan",
                codigo: codigo
            })
        })

        status.innerText = "✅ " + codigo
        beep()

        setTimeout(()=>{
            status.innerText = "Escaneando..."
        },1000)
    }
})

</script>

</body>
</html>
