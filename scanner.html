<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/@zxing/library@latest"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>

<body>

<h2>📷 Scanner CHIC FIREBASE v2.6</h2>
<p id="status">📷 Escaneá un producto</p>
<video id="video" width="300"></video>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCe2I-jg8A3nmVC0fJLxgVlEkjfYzKi3ns",
  authDomain: "chic-pos.firebaseapp.com",
  projectId: "chic-pos",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const codeReader = new ZXing.BrowserMultiFormatReader()
const video = document.getElementById("video")
const status = document.getElementById("status")

let lastCode = null
let lastScanTime = 0
let bloqueadoHasta = 0

const beepAudio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg")

function beep() {
    beepAudio.currentTime = 0
    beepAudio.play().catch(() => {})
}

function vibrar() {
    if (navigator.vibrate) navigator.vibrate(80)
}

function enviar(codigo) {
    const scanId = Date.now() + "_" + Math.random().toString(36).substring(2)

    status.innerText = "✅ Leído: " + codigo
    beep()
    vibrar()

    // 🔥 Enviar a Firebase SIN trabar el scanner
    db.collection("scanner").doc(scanId).set({
        codigo: codigo,
        timestamp: Date.now(),
        scanId: scanId
    })
    .then(() => {
        status.innerText = "✅ Enviado: " + codigo

        setTimeout(() => {
            status.innerText = "📷 Listo para escanear otro producto"
        }, 500)
    })
    .catch(error => {
        console.error("Error Firebase:", error)
        status.innerText = "⚠️ Error enviando. Escaneá de nuevo."
    })
}

function startScanner() {
    codeReader.decodeFromVideoDevice(null, video, (result) => {

        if (!result) return

        const codigo = result.text.trim()
        const now = Date.now()

        if (!codigo) return

        // evita doble lectura inmediata
        if (now < bloqueadoHasta) return

        // evita repetir el mismo QR muy rápido
        if (codigo === lastCode && (now - lastScanTime) < 1500) return

        lastCode = codigo
        lastScanTime = now
        bloqueadoHasta = now + 700

        enviar(codigo)
    })
}

startScanner()
</script>

</body>
</html>
