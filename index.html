<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
}

.header {
    background: black;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

#video {
    width: 100%;
    max-height: 220px;
    object-fit: cover;
}

.container {
    padding: 15px;
}

.status {
    text-align: center;
    margin: 10px 0;
    font-weight: bold;
}

.producto {
    background: white;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.info {
    font-size: 14px;
}

.precio {
    font-weight: bold;
}

.btn-eliminar {
    background: red;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 5px 8px;
}

.total-box {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-top: 10px;
    text-align: center;
}

.total {
    font-size: 28px;
    font-weight: bold;
}

.btn-finalizar {
    width: 100%;
    margin-top: 10px;
    padding: 18px;
    font-size: 20px;
    background: black;
    color: white;
    border: none;
    border-radius: 12px;
}
</style>

</head>

<body>

<div class="header">🧾 Caja CHIC PRO 2.1</div>

<video id="video"></video>

<div class="container">

<div id="status" class="status">📷 Escaneá un producto</div>

<div id="lista"></div>

<div class="total-box">
    <div>Total</div>
    <div id="total" class="total">$0</div>
</div>

<!-- 💳 METODO DE PAGO -->
<select id="pago" style="width:100%; padding:12px; margin-top:10px; border-radius:10px;">
    <option value="Efectivo">Efectivo</option>
    <option value="Transferencia">Transferencia</option>
    <option value="Mercado Pago">Mercado Pago</option>
</select>

<button class="btn-finalizar" onclick="finalizarVenta()">
Finalizar Venta
</button>

</div>

<script>

const codeReader = new ZXing.BrowserMultiFormatReader()
const video = document.getElementById('video')

let scanning = true
let lastCode = null
let total = 0
let carrito = []

// 🔊 beep
function beep() {
    const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg")
    audio.play()
}

// 🧠 detectar producto
function getProductoData(codigo) {

    let precio = 0
    let producto = ""

    if (codigo.startsWith("N")) {
        producto = "CHIC 2.0 Negro"
        precio = 37000
    } 
    else if (codigo.startsWith("T")) {

        let talle = parseInt(codigo.substring(1))

        if (talle >= 27 && talle <= 32) {
            producto = "CHIC Niño"
            precio = 25000
        } else {
            producto = "CHIC 1.0"
            precio = 30000
        }
    } 
    else {
        producto = "CHIC 2.0"
        precio = 35000
    }

    return { producto, precio }
}

function procesarCodigo(codigo) {

    codigo = codigo.toUpperCase().trim()

    let data = getProductoData(codigo)

    carrito.push({
        producto: data.producto,
        codigo: codigo,
        precio: data.precio
    })

    recalcularTotal()
    renderLista()

    document.getElementById("status").innerText = "✅ " + codigo
    beep()
}

// 🔢 cambiar cantidad
function cambiarCantidad(codigo, nuevaCantidad) {

    nuevaCantidad = parseInt(nuevaCantidad)

    carrito = carrito.filter(item => item.codigo !== codigo)

    for (let i = 0; i < nuevaCantidad; i++) {
        let data = getProductoData(codigo)

        carrito.push({
            producto: data.producto,
            codigo: codigo,
            precio: data.precio
        })
    }

    recalcularTotal()
    renderLista()
}

// ❌ eliminar
function eliminar(codigo) {

    let index = carrito.findIndex(p => p.codigo === codigo)

    if (index !== -1) {
        carrito.splice(index, 1)
    }

    recalcularTotal()
    renderLista()
}

// 🔁 recalcular total
function recalcularTotal() {
    total = carrito.reduce((acc, item) => acc + item.precio, 0)
    document.getElementById("total").innerText = "$" + total
}

// 🧾 render
function renderLista() {

    let agrupado = {}

    carrito.forEach(item => {
        let key = item.producto + "_" + item.codigo

        if (!agrupado[key]) {
            agrupado[key] = { ...item, cantidad: 1 }
        } else {
            agrupado[key].cantidad++
        }
    })

    let html = ""

    Object.values(agrupado).forEach(item => {
        html += `
        <div class="producto">
            <div class="info">
                ${item.producto} - ${item.codigo}
                <br>
                Cantidad: 
                <input type="number" min="1" value="${item.cantidad}" 
                onchange="cambiarCantidad('${item.codigo}', this.value)" style="width:60px;">
            </div>
            <div>
                <div class="precio">$${item.precio * item.cantidad}</div>
                <button class="btn-eliminar" onclick="eliminar('${item.codigo}')">✕</button>
            </div>
        </div>`
    })

    document.getElementById("lista").innerHTML = html
}

// 📷 scanner
function startScanner() {

    codeReader.decodeFromVideoDevice(null, video, (result, err) => {

        if (result && scanning) {

            let codigo = result.text.trim()

            if (!codigo) return
            if (codigo === lastCode) return

            lastCode = codigo
            scanning = false

            procesarCodigo(codigo)

            setTimeout(() => {
                scanning = true
            }, 250)
        }
    })
}

// 💳 finalizar venta
function finalizarVenta() {

    if (carrito.length === 0) return

    let metodoPago = document.getElementById("pago").value

    fetch("https://script.google.com/macros/s/AKfycbzqftjGLBS89N_wp7vf3tPaZyLCljIgyy6DZ6i-snWr7N6rlVeKspAcfWK3JZrfHDyYxg/exec", {
        method: "POST",
        body: JSON.stringify({
            items: carrito,
            total: total,
            pago: metodoPago
        })
    })

    alert("Venta registrada ✅ Total: $" + total)

    carrito = []
    total = 0
    lastCode = null

    document.getElementById("lista").innerHTML = ""
    document.getElementById("total").innerText = "$0"
    document.getElementById("status").innerText = "📷 Escaneá un producto"
}

startScanner()

</script>

</body>
</html>
