<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/@zxing/library@latest"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>

<body>

<h2>📷 Scanner CHIC FIREBASE v2.5</h2>
<p id="status">Escaneá un producto</p>
<video id="video" width="300"></video>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCe2I-jg8A3nmVC0fJLxgVlEkjfYzKi3ns",
  authDomain: "chic-pos.firebaseapp.com",
  projectId: "chic-pos",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const codeReader = new ZXing.BrowserMultiFormatReader()
const video = document.getElementById('video')

// 🧠 CONTROL INTELIGENTE
let lastCode = null
let lastScanTime = 0
let scanning = true

function beep() {
    new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play()
}

function vibrar() {
    if (navigator.vibrate) navigator.vibrate(100)
}

async function enviar(codigo) {
    document.getElementById("status").innerText = "⏳ Enviando " + codigo

    const scanId = Date.now() + "_" + Math.random().toString(36).substring(2)

    try {
        await Promise.race([
            db.collection("scanner").doc(scanId).set({
                codigo: codigo,
                timestamp: Date.now(),
                scanId: scanId
            }),

            new Promise((_, reject) => {
                setTimeout(() => reject(new Error("Firebase lento")), 3500)
            })
        ])

        document.getElementById("status").innerText = "✅ Escaneado: " + codigo
        beep()
        vibrar()

    } catch (error) {
        console.error("Error o demora Firebase:", error)

        document.getElementById("status").innerText =
            "⚠️ Firebase lento. Revisá si apareció en caja."

    } finally {
        setTimeout(() => {
            document.getElementById("status").innerText =
                "📷 Listo para escanear otro producto"

            scanning = true
            lastCode = null
        }, 700)
    }
}

function startScanner() {
    codeReader.decodeFromVideoDevice(null, video, async (result) => {

        if (!result || !scanning) return

        let codigo = result.text.trim()
        let now = Date.now()

        if (!codigo) return

        if (codigo === lastCode && (now - lastScanTime) < 1200) return

        scanning = false
        lastCode = codigo
        lastScanTime = now
enviar(codigo)
    })
}

startScanner()

</script>

</body>
</html>
